<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chess Game Analyzer</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding: 10px; 
            background: #262522; 
            color: #fff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            min-height: 100vh;
        }
        #sidebar, #main-layout { 
            width: 100%; 
            max-width: 360px; 
            box-sizing: border-box; 
        }
        .input-group { display: flex; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 4px 0 0 4px; font-size: 15px; background: #45413c; color: white; }
        button { background: #81b64c; color: white; border: none; padding: 12px 15px; cursor: pointer; font-weight: bold; font-size: 15px; border-radius: 0 4px 4px 0;}
        
        #games-list { 
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            margin-bottom: 15px;
            min-height: 50px;
        }
        .game-item { 
            flex: 0 0 140px;
            background: #312e2b; 
            padding: 10px; 
            cursor: pointer; 
            border-radius: 6px; 
            border: 1px solid #45413c; 
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-item:hover { border-color: #81b64c; }
        
        #evaluation { text-align: center; background: #312e2b; padding: 12px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; font-weight: bold; }
        
        /* THE FIX: Hardcoded 12.5% rows and columns to prevent shapeshifting */
        #chess-grid {
            display: grid;
            grid-template-columns: repeat(8, 12.5%);
            grid-template-rows: repeat(8, 12.5%);
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid #312e2b;
            border-radius: 4px;
            overflow: hidden;
            background: #403e3a;
        }
        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            user-select: none;
            overflow: hidden; /* Prevents pieces from pushing boundaries */
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        
        .controls { display: flex; gap: 10px; width: 100%; margin-top: 12px; }
        .control-btn { flex: 1; border-radius: 4px; background: #45413c; padding: 14px; color: white; font-weight: bold; border: none; cursor: pointer;}
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="input-group">
            <input type="text" id="username" placeholder="Username...">
            <button onclick="fetchGames()">Load</button>
        </div>
        <div id="games-list"></div>
    </div>

    <div id="main-layout">
        <div id="evaluation">Evaluation: 0.00</div>
        <div id="chess-grid"></div>
        <div class="controls">
            <button class="control-btn" onclick="moveBack()">тЧА Back</button>
            <button class="control-btn" onclick="moveForward()">Next тЦ╢</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var gameEngine = new Chess();
        var moveHistory = [];
        var currentMoveIndex = -1;
        var fetchedGamesList = []; 
        var stockfish = null; 

        const pieceSymbols = {
            'p': 'тЩЯ', 'r': 'тЩЬ', 'n': 'тЩЮ', 'b': 'тЩЭ', 'q': 'тЩЫ', 'k': 'тЩЪ',
            'P': 'тЩЯ', 'R': 'тЩЬ', 'N': 'тЩЮ', 'B': 'тЩЭ', 'Q': 'тЩЫ', 'K': 'тЩЪ'
        };

        // Initialize Engine via Blob
        fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js')
            .then(function(response) { return response.text(); })
            .then(function(text) {
                var blob = new Blob([text], {type: 'application/javascript'});
                var blobUrl = URL.createObjectURL(blob);
                stockfish = new Worker(blobUrl);
                
                stockfish.onmessage = function(event) {
                    var line = typeof event.data === 'string' ? event.data : event.data.data;
                    if (!line) return;

                    if (line.includes('score cp')) {
                        var parts = line.split(' ');
                        var cpIndex = parts.indexOf('cp');
                        var score = (parseInt(parts[cpIndex + 1]) / 100).toFixed(2);
                        if (gameEngine.turn() === 'b') { score = -score; }
                        document.getElementById('evaluation').innerText = "Evaluation: " + (score > 0 ? '+' : '') + score;
                    } else if (line.includes('score mate')) {
                        var parts = line.split(' ');
                        var mateIndex = parts.indexOf('mate');
                        document.getElementById('evaluation').innerText = "Mate in " + Math.abs(parts[mateIndex + 1]);
                    }
                };
                
                stockfish.postMessage('uci');
            })
            .catch(function(err) {
                document.getElementById('evaluation').innerText = "Engine failed to load";
                console.error(err);
            });

        function drawNativeBoard() {
            const grid = document.getElementById('chess-grid');
            grid.innerHTML = '';
            const boardState = gameEngine.board(); 

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) { 
                    const square = document.createElement('div');
                    const isLight = (r + c) % 2 === 0;
                    square.className = 'square ' + (isLight ? 'light' : 'dark');
                    
                    const piece = boardState[r][c];
                    if (piece) {
                        square.innerText = pieceSymbols[piece.type] || '';
                        if (piece.color === 'w') {
                            square.style.color = '#ffffff';
                            square.style.textShadow = '0px 0px 3px #000'; 
                        } else {
                            square.style.color = '#000000';
                        }
                    }
                    grid.appendChild(square);
                }
            }
        }

        window.onload = function() {
            drawNativeBoard();
        };

        function fetchGames() {
            const user = document.getElementById('username').value.trim();
            const listDiv = document.getElementById('games-list');
            if(!user) return;
            listDiv.innerHTML = "<p style='font-size:14px;'>Loading...</p>";

            fetch('/api/games/' + user)
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    listDiv.innerHTML = "";
                    if(data.error) { listDiv.innerHTML = "<p style='color:#ff6b6b; font-size:14px;'>" + data.error + "</p>"; return; }
                    
                    fetchedGamesList = data; 
                    
                    data.forEach(function(game, index) {
                        const item = document.createElement('div');
                        item.className = 'game-item';
                        item.innerHTML = '<strong>' + game.white + '</strong> vs <strong>' + game.black + '</strong><br><span style="color:#b1b0af">' + game.result + '</span>';
                        item.onclick = function() { selectGameByIndex(index); };
                        listDiv.appendChild(item);
                    });
                }).catch(function() {
                    listDiv.innerHTML = "<p style='color:#ff6b6b; font-size:14px;'>Failed to fetch.</p>";
                });
        }

        function selectGameByIndex(index) {
            var selectedGame = fetchedGamesList[index];
            if (selectedGame && selectedGame.pgn) {
                gameEngine.load_pgn(selectedGame.pgn);
                moveHistory = gameEngine.history({ verbose: true });
                gameEngine.reset();
                drawNativeBoard();
                currentMoveIndex = -1;
                document.getElementById('evaluation').innerText = "Evaluation: 0.00";
            }
        }

        function runEngineAnalysis() {
            if (stockfish) {
                document.getElementById('evaluation').innerText = "Analyzing...";
                stockfish.postMessage('position fen ' + gameEngine.fen());
                stockfish.postMessage('go depth 10'); 
            } else {
                document.getElementById('evaluation').innerText = "Engine initializing...";
            }
        }

        function moveForward() {
            if (currentMoveIndex < moveHistory.length - 1) {
                currentMoveIndex++;
                gameEngine.move(moveHistory[currentMoveIndex].san);
                drawNativeBoard();
                runEngineAnalysis();
            }
        }

        function moveBack() {
            if (currentMoveIndex >= 0) {
                gameEngine.undo();
                drawNativeBoard();
                runEngineAnalysis();
                currentMoveIndex--;
            }
        }
    </script>
</body>
</html>
