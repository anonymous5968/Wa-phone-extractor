<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chess Game Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding: 10px; 
            background: #262522; 
            color: #fff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            min-height: 100vh;
        }
        #sidebar { 
            width: 100%; 
            max-width: 400px; 
            background: #312e2b; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
        }
        #main-layout { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box;
        }
        #board-container { 
            width: 100%; 
            max-width: 380px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        #myBoard {
            width: 100% !important;
            margin: 0 auto;
        }
        .input-group { display: flex; margin-bottom: 10px; }
        input { flex: 1; padding: 10px; border: none; border-radius: 4px 0 0 4px; font-size: 15px; background: #45413c; color: white; }
        button { background: #81b64c; color: white; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; font-size: 15px; }
        #search-btn { border-radius: 0 4px 4px 0; }
        
        /* Compact horizontal scroll for games list on mobile */
        #games-list { 
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: thin;
        }
        .game-item { 
            flex: 0 0 160px;
            background: #262522; 
            padding: 8px; 
            cursor: pointer; 
            border-radius: 6px; 
            border: 1px solid #45413c; 
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-item:hover { border-color: #81b64c; }
        
        .controls { display: flex; justify-content: space-between; width: 100%; margin-top: 12px; }
        .control-btn { flex: 1; margin: 0 5px; border-radius: 4px; background: #45413c; padding: 12px; }
        #evaluation { text-align: center; background: #312e2b; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="input-group">
            <input type="text" id="username" placeholder="Username...">
            <button id="search-btn" onclick="fetchGames()">Load</button>
        </div>
        <div id="games-list"></div>
    </div>

    <div id="main-layout">
        <div id="evaluation">Evaluation: 0.00</div>
        <div id="board-container">
            <div id="myBoard"></div>
            <div class="controls">
                <button class="control-btn" onclick="moveBack()">◀ Back</button>
                <button class="control-btn" onclick="moveForward()">Next ▶</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var gameEngine = new Chess();
        var moveHistory = [];
        var currentMoveIndex = -1;
        var fetchedGamesList = []; 

        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        stockfish.onmessage = function(event) {
            const line = event.data;
            if (line.includes('score cp')) {
                const parts = line.split(' ');
                const cpIndex = parts.indexOf('cp');
                let score = (parseInt(parts[cpIndex + 1]) / 100).toFixed(2);
                if (gameEngine.turn() === 'b') { score = -score; }
                document.getElementById('evaluation').innerText = `Evaluation: ${score > 0 ? '+' : ''}${score}`;
            } else if (line.includes('score mate')) {
                const parts = line.split(' ');
                const mateIndex = parts.indexOf('mate');
                document.getElementById('evaluation').innerText = `Mate in ${Math.abs(parts[mateIndex + 1])}`;
            }
        };

        $(document).ready(function() {
            board = Chessboard('myBoard', {
                position: 'start',
                draggable: true,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            
            // Adjust board size dynamically to fit phone viewport widths
            $(window).resize(board.resize);
        });

        function fetchGames() {
            const user = document.getElementById('username').value.trim();
            const listDiv = document.getElementById('games-list');
            if(!user) return;
            listDiv.innerHTML = "<p style='font-size:14px;'>Loading...</p>";

            fetch(`/api/games/${user}`)
                .then(res => res.json())
                .then(data => {
                    listDiv.innerHTML = "";
                    if(data.error) { listDiv.innerHTML = `<p style="color:#ff6b6b; font-size:14px;">${data.error}</p>`; return; }
                    
                    fetchedGamesList = data; 
                    
                    data.forEach((game, index) => {
                        const item = document.createElement('div');
                        item.className = 'game-item';
                        item.innerHTML = `<strong>${game.white}</strong> vs <strong>${game.black}</strong><br><span style="color:#b1b0af">${game.result}</span>`;
                        item.onclick = () => selectGameByIndex(index); 
                        listDiv.appendChild(item);
                    });
                });
        }

        function selectGameByIndex(index) {
            const selectedGame = fetchedGamesList[index];
            if (selectedGame && selectedGame.pgn) {
                loadGamePgn(selectedGame.pgn);
            }
        }

        function loadGamePgn(pgn) {
            gameEngine.load_pgn(pgn);
            moveHistory = gameEngine.history({ verbose: true });
            gameEngine.reset();
            board.start();
            currentMoveIndex = -1;
            document.getElementById('evaluation').innerText = "Evaluation: 0.00";
        }

        function runEngineAnalysis() {
            document.getElementById('evaluation').innerText = "Analyzing...";
            stockfish.postMessage('position fen ' + gameEngine.fen());
            stockfish.postMessage('go depth 10'); 
        }

        function moveForward() {
            if (currentMoveIndex < moveHistory.length - 1) {
                currentMoveIndex++;
                gameEngine.move(moveHistory[currentMoveIndex].san);
                board.position(gameEngine.fen());
                runEngineAnalysis();
            }
        }

        function moveBack() {
            if (currentMoveIndex >= 0) {
                gameEngine.undo();
                board.position(gameEngine.fen());
                runEngineAnalysis();
                currentMoveIndex--;
            }
        }
    </script>
</body>
    </html>
